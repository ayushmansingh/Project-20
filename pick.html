<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Eyedropper — sample your card red</title>
<style>
  :root{--bg:#1c1c1e;--panel:#2a2a2d;--line:#3a3a3e;--tx:#f2efe9;--mut:#a8a59e}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--tx);font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:24px;min-height:100vh}
  .wrap{max-width:920px;margin:0 auto}
  h1{font-size:20px;font-weight:600;margin-bottom:4px}
  p.sub{color:var(--mut);margin-bottom:18px}
  .drop{border:1.5px dashed var(--line);border-radius:14px;padding:38px;text-align:center;color:var(--mut);cursor:pointer;transition:border-color .2s,background .2s}
  .drop:hover,.drop.over{border-color:#7a7;background:rgba(120,170,120,.06)}
  .stage{position:relative;margin-top:18px;display:none}
  canvas#view{max-width:100%;border-radius:12px;display:block;cursor:crosshair}
  .loupe{position:fixed;width:128px;height:128px;border-radius:50%;border:2px solid #fff;box-shadow:0 6px 24px rgba(0,0,0,.5);pointer-events:none;display:none;image-rendering:pixelated;background-repeat:no-repeat;z-index:10}
  .loupe::after{content:"";position:absolute;left:50%;top:50%;width:10px;height:10px;transform:translate(-50%,-50%);border:1.5px solid rgba(255,255,255,.9);border-radius:2px;mix-blend-mode:difference}
  .panel{margin-top:18px;display:flex;gap:16px;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px;flex-wrap:wrap}
  .sw{width:84px;height:84px;border-radius:12px;border:1px solid var(--line);flex:none}
  .read{font-family:"SF Mono",ui-monospace,Menlo,monospace}
  .hex{font-size:30px;font-weight:600;letter-spacing:.5px}
  .rgb{color:var(--mut);font-size:14px;margin-top:3px}
  .hint{color:var(--mut);font-size:13px;margin-top:6px}
  .locked{margin-left:auto;text-align:right}
  .locked .lab{color:var(--mut);font-size:12px;text-transform:uppercase;letter-spacing:.1em}
  .locked .val{font-family:"SF Mono",ui-monospace,Menlo,monospace;font-size:26px;font-weight:600}
  .copied{color:#8fce8f;font-size:13px;height:16px}
  input[type=file]{display:none}
</style>
</head>
<body>
<div class="wrap">
  <h1>Card red — eyedropper</h1>
  <p class="sub">Drop your wedding card image below, then <b>hover</b> to inspect and <b>click</b> the red to lock the exact hex. It averages a 9×9 patch so JPEG speckle doesn’t throw it off.</p>

  <label class="drop" id="drop">
    <div>Drop the card image here, or click to choose a file</div>
    <input type="file" id="file" accept="image/*">
  </label>

  <div class="stage" id="stage">
    <canvas id="view"></canvas>
  </div>

  <div class="panel" id="panel" style="display:none">
    <div class="sw" id="sw"></div>
    <div class="read">
      <div class="hex" id="hex">#000000</div>
      <div class="rgb" id="rgb">rgb(0, 0, 0)</div>
      <div class="hint">Move over the card to inspect · click to lock + copy</div>
    </div>
    <div class="locked">
      <div class="lab">Locked value</div>
      <div class="val" id="locked">—</div>
      <div class="copied" id="copied"></div>
    </div>
  </div>
</div>

<div class="loupe" id="loupe"></div>

<script>
(function(){
  const drop=document.getElementById('drop'), file=document.getElementById('file');
  const stage=document.getElementById('stage'), view=document.getElementById('view'), vctx=view.getContext('2d');
  const panel=document.getElementById('panel'), sw=document.getElementById('sw'), hexEl=document.getElementById('hex'),
        rgbEl=document.getElementById('rgb'), lockedEl=document.getElementById('locked'), copiedEl=document.getElementById('copied');
  const loupe=document.getElementById('loupe');
  const buf=document.createElement('canvas'); const bctx=buf.getContext('2d',{willReadFrequently:true});
  let scale=1;

  function load(f){
    const img=new Image();
    img.onload=function(){
      buf.width=img.naturalWidth; buf.height=img.naturalHeight;
      bctx.drawImage(img,0,0);
      const maxW=Math.min(880, img.naturalWidth);
      scale=maxW/img.naturalWidth;
      view.width=Math.round(img.naturalWidth*scale);
      view.height=Math.round(img.naturalHeight*scale);
      vctx.drawImage(img,0,0,view.width,view.height);
      stage.style.display='block'; panel.style.display='flex'; drop.style.display='none';
    };
    img.src=URL.createObjectURL(f);
  }
  function hx(n){return n.toString(16).padStart(2,'0').toUpperCase();}
  function sampleAt(nx,ny){
    const r=4; let R=0,G=0,B=0,c=0;
    const x0=Math.max(0,nx-r), y0=Math.max(0,ny-r);
    const w=Math.min(buf.width-x0, r*2+1), h=Math.min(buf.height-y0, r*2+1);
    const d=bctx.getImageData(x0,y0,w,h).data;
    for(let i=0;i<d.length;i+=4){R+=d[i];G+=d[i+1];B+=d[i+2];c++;}
    return [Math.round(R/c),Math.round(G/c),Math.round(B/c)];
  }
  function show(rgb){
    const hex='#'+hx(rgb[0])+hx(rgb[1])+hx(rgb[2]);
    sw.style.background=hex; hexEl.textContent=hex; rgbEl.textContent='rgb('+rgb[0]+', '+rgb[1]+', '+rgb[2]+')';
    return hex;
  }
  view.addEventListener('mousemove',function(e){
    const r=view.getBoundingClientRect();
    const vx=e.clientX-r.left, vy=e.clientY-r.top;
    const nx=Math.round(vx/scale), ny=Math.round(vy/scale);
    show(sampleAt(nx,ny));
    const Z=8, sz=128, half=sz/(2*Z);
    loupe.style.display='block';
    loupe.style.left=(e.clientX-sz/2)+'px'; loupe.style.top=(e.clientY-sz/2)+'px';
    loupe.style.backgroundImage='url('+buf.toDataURL()+')';
    loupe.style.backgroundSize=(buf.width*Z)+'px '+(buf.height*Z)+'px';
    loupe.style.backgroundPosition=(-(nx*Z)+sz/2)+'px '+(-(ny*Z)+sz/2)+'px';
  });
  view.addEventListener('mouseleave',function(){loupe.style.display='none';});
  view.addEventListener('click',function(e){
    const r=view.getBoundingClientRect();
    const nx=Math.round((e.clientX-r.left)/scale), ny=Math.round((e.clientY-r.top)/scale);
    const hex=show(sampleAt(nx,ny));
    lockedEl.textContent=hex;
    navigator.clipboard&&navigator.clipboard.writeText(hex).then(function(){
      copiedEl.textContent='copied to clipboard ✓'; setTimeout(()=>copiedEl.textContent='',1600);
    });
  });

  file.addEventListener('change',e=>{if(e.target.files[0])load(e.target.files[0]);});
  drop.addEventListener('click',()=>file.click());
  ['dragenter','dragover'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('over');}));
  ['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove('over');}));
  drop.addEventListener('drop',e=>{const f=e.dataTransfer.files[0];if(f)load(f);});
})();
</script>
</body>
</html>
